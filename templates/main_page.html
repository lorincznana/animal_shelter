<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ shelter_info.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <header class="site-header">
        <div class="header-inner">
            <h1 class="logo">
              {% if shelter_info %}
                {{ shelter_info.name }}
              {% else %}
                Állatotthon
              {% endif %}
            </h1>
            <nav>
                <a href="{{ url_for('list_animals') }}">Kisállataink</a>
                <a href="{{ url_for('login') }}">Bejelentkezés</a>
                <a href="{{ url_for('register') }}">Regisztráció</a>
                <a href="{{ url_for('about_page') }}">Rólunk</a>
                <a href="{{ url_for('main_page') }}">Főoldal</a>

            </nav>
        </div>
    </header>
  <main class="container">
    {% block content %}{% endblock %}

  </main>
    <footer class ="site-footer">
        <hr>
        <p>&copy; 2025 {{ shelter_info.name }}</p>
    </footer>
  </body>
</html>
