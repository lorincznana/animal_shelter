{% extends 'main_page.html' %}
{% block content %}

<h2>Kisállat szerkesztése: {{ animal.name }}</h2>
<hr>

<form method="POST" action="{{ url_for('edit_animal', animal_id=animal.id) }}">
    <label>Név:</label><br>
    <input type="text" name="name" value="{{ animal.name }}" required><br><br>

    <label>Faj:</label><br>
    <input type="text" name="species" value="{{ animal.species }}" required><br><br>

    <label>Fajta:</label><br>
    <input type="text" name="breed" value="{{ animal.breed or '' }}"><br><br>

    <label>Kor:</label><br>
    <input type="number" name="age" value="{{ animal.age or '' }}" min="0"><br><br>

    <label>Nem:</label><br>
    <select name="gender" required>
        <option value="hím" {% if animal.gender == 'hím' %}selected{% endif %}>Hím</option>
        <option value="kan" {% if animal.gender == 'kan' %}selected{% endif %}>Kan</option>
        <option value="nőstény" {% if animal.gender == 'nőstény' %}selected{% endif %}>Nőstény</option>
        <option value="szuka" {% if animal.gender == 'szuka' %}selected{% endif %}>Szuka</option>
    </select><br><br>

    <label>Leírás:</label><br>
    <textarea name="description" rows="4" cols="40">{{ animal.description or '' }}</textarea><br><br>

    <label>Kép URL:</label><br>
    <input type="text" name="image_url" value="{{ animal.image_url or '' }}"><br><br>

    <label>
        <input type="checkbox" name="available" {% if animal.available %}checked{% endif %}>
        Örökbe fogadható
    </label><br><br>

    <button type="submit">Módosítások mentése</button>
</form>

<br>
<a href="{{ url_for('list_animals') }}">⬅ Vissza a kisállatokhoz</a>

{% endblock %}
