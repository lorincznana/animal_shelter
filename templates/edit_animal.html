{% extends 'main_page.html' %}
{% block content %}

<div class="animal-container"><br>
<h2>Kisállat szerkesztése: {{ animal.name }}</h2>

<form method="POST" class="fancy-form" action= "{{ url_for('edit_animal', animal_id=animal.id) }}">
        <label>Név:</label>
    <input type="text" name="name" required>

    <label>Faj:</label>
    <input type="text" name="species" required>

    <label>Fajta:</label>
    <input type="text" name="breed">

    <label>Kor:</label>
    <input type="number" name="age" min="0">

    <label>Nem:</label>
    <select name="gender" required>
        <option value="hím">Hím</option>
        <option value="kan">Kan</option>
        <option value="nőstény">Nőstény</option>
        <option value="szuka">Szuka</option>
    </select>
    <label>Leírás:</label>
    <textarea name="description" rows="4" cols="40"></textarea>

    <label>Kép URL:</label>
    <input type="text" name="image_url">

    <h3>Orvosi bejegyzések</h3>
    {% for record in animal.medical_records %}
    <div class="medical-record-block">
        <hr>
        <input type="hidden" name="record_id[]" value="{{ record.id }}">

        <label>Vakcina:</label>
        <input type="text" name="vaccine[]" value="{{ record.vaccine or '' }}">

        <label>Vakcina dátuma:</label>
        <input type="date" name="vaccine_date[]" value="{{ record.vaccine_date or '' }}">

        <label>Betegség:</label>
        <input type="text" name="disease[]" value="{{ record.disease or '' }}">

        <label>Kezelés:</label>
        <input type="text" name="treatment[]" value="{{ record.treatment or '' }}">

        <label>Állatorvos:</label>
        <input type="text" name="vet_name[]" value="{{ record.vet_name or '' }}">

        <button type="button" onclick="removeRecord(this)">🗑 Bejegyzés törlése</button>
    </div>
    {% endfor %}
</div>

<button type="button" onclick="addRecord()">➕ Új bejegyzés hozzáadása</button>
    <button type="submit">Módosítások mentése</button>
</form>
</div>
<br>
<a href="{{ url_for('list_animals') }}">⬅ Vissza a kisállatokhoz</a>

{% endblock %}
